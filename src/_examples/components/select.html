<w-view class="view" path="/Select">
    <h2>Select</h2>
    <w-select value="apple" label="Select a fruit">
        <w-slot trigger>
            <button class="select-trigger">
                Apple <span w-icon>➔</span>
            </button>
        </w-slot>
        <w-slot menu>
            <div class="select-listbox">
                <w-slot opt><div value="apple" class="select-option">Apple</div></w-slot>
                <w-slot opt><div value="banana" class="select-option">Banana</div></w-slot>
                <w-slot opt><div value="cherry" class="select-option">Cherry</div></w-slot>
                <w-slot opt><div value="date" class="select-option">Date</div></w-slot>
            </div>
        </w-slot>
    </w-select>

    <style>
        .select-trigger {
            padding: 0.5rem 2rem 0.5rem 1rem;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            min-width: 150px;
            text-align: left;
            display: inline-flex;
            justify-content: space-between;
        }

        .select-listbox {
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            min-width: 150px;
        }

        .select-option {
            padding: 0.5rem 1rem;
            cursor: pointer;
        }

        .select-option:hover,
        .select-option[data-highlighted] {
            background: #f0f0f0;
        }
    </style>
</w-view>
