<w-view class="view" path="/Accordion">
  <h2>Accordion</h2>
  <w-accordion value="item1" multiple>
    <w-slot item>
      <div name="item1" class="accordion-item">
        <w-slot trigger>
          <button class="accordion-trigger">Section 1</button>
        </w-slot>
        <w-slot body>
          <div class="accordion-body">Content for section 1</div>
        </w-slot>
      </div>
    </w-slot>
    <w-slot item>
      <div name="item2" class="accordion-item">
        <w-slot trigger>
          <button class="accordion-trigger">Section 2</button>
        </w-slot>
        <w-slot body>
          <div class="accordion-body">Content for section 2</div>
        </w-slot>
      </div>
    </w-slot>
    <w-slot item>
      <div name="item3" class="accordion-item">
        <w-slot trigger>
          <button class="accordion-trigger">Section 3</button>
        </w-slot>
        <w-slot body>
          <div class="accordion-body">Content for section 3</div>
        </w-slot>
      </div>
    </w-slot>
  </w-accordion>

  <style>
    .accordion-item {
      border: 1px solid #ccc;
      margin-bottom: -1px;
    }

    .accordion-trigger {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      background: #f9f9f9;
      cursor: pointer;
      text-align: left;
    }

    .accordion-body {
      padding: 1rem;
      background: white;
    }
  </style>
</w-view>
