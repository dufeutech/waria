<w-view class="view" path="/Toolbar">
    <h2>Toolbar</h2>
    <w-toolbar label="Text formatting" class="toolbar-frame">
        <w-slot item name="bold"><button class="toolbar-btn" style="font-weight: bold;">B</button></w-slot>
        <w-slot item name="italic"><button class="toolbar-btn" style="font-style: italic;">I</button></w-slot>
        <w-slot item name="underline"><button class="toolbar-btn" style="text-decoration: underline;">U</button></w-slot>
        <w-slot sep><div class="toolbar-sep"></div></w-slot>
        <w-slot item name="align-left"><button class="toolbar-btn">⬅</button></w-slot>
        <w-slot item name="align-center"><button class="toolbar-btn">⬛</button></w-slot>
        <w-slot item name="align-right"><button class="toolbar-btn">➡</button></w-slot>
        <w-slot sep><div class="toolbar-sep"></div></w-slot>
        <w-slot item name="bullet-list"><button class="toolbar-btn">•</button></w-slot>
        <w-slot item name="number-list"><button class="toolbar-btn">1.</button></w-slot>
    </w-toolbar>

    <h3 style="margin-top: 2rem;">Vertical Toolbar</h3>
    <w-toolbar label="Drawing tools" orientation="vertical" class="toolbar-frame" style="width: fit-content;">
        <w-slot item name="select"><button class="toolbar-btn">↖</button></w-slot>
        <w-slot item name="pen"><button class="toolbar-btn">✏</button></w-slot>
        <w-slot item name="brush"><button class="toolbar-btn">🖌</button></w-slot>
        <w-slot sep><div class="toolbar-sep"></div></w-slot>
        <w-slot item name="rectangle"><button class="toolbar-btn">▭</button></w-slot>
        <w-slot item name="circle"><button class="toolbar-btn">○</button></w-slot>
    </w-toolbar>
    <p style="margin-top: 1rem; color: #666; font-size: 0.9rem;">
        Use Arrow keys to navigate. Home/End to jump to first/last item.
    </p>

    <style>
        .toolbar-frame {
            background: #f5f5f5;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .toolbar-btn {
            padding: 0.5rem;
            cursor: pointer;
        }

        .toolbar-sep {
            width: 1px;
            background: #ccc;
            margin: 0 0.5rem;
            align-self: stretch;
        }

        w-toolbar[orientation="vertical"] .toolbar-sep {
            width: auto;
            height: 1px;
            margin: 0.5rem 0;
        }
    </style>
</w-view>
