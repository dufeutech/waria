<w-view class="view" path="/Separator">
    <h2>Separator</h2>
    <p>Horizontal separator:</p>
    <w-separator style="margin: 1rem 0;"></w-separator>
    <p>Vertical separator (in flex container):</p>
    <div style="display: flex; align-items: center; gap: 1rem; height: 1.5em;">
        <span>Left</span>
        <w-separator orientation="vertical"></w-separator>
        <span>Right</span>
    </div>
    <p style="margin-top: 1rem;">Decorative separator:</p>
    <w-separator decorative style="margin: 1rem 0;"></w-separator>
</w-view>
